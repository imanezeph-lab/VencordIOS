name: Build Vencord iOS IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.2'

      - name: Install dependencies
        run: |
          brew install ldid dpkg optool libimobiledevice
          brew install --cask ios-deploy

      - name: Install Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git ~/theos
          echo "export THEOS=~/theos" >> $GITHUB_ENV
          echo "export PATH=$THEOS/bin:$PATH" >> $GITHUB_ENV

      - name: Setup Theos
        run: |
          mkdir -p ~/theos/sdks
          curl -sL https://github.com/theos/sdks/archive/master.tar.gz | tar xz --strip-components=1 -C ~/theos/sdks
          export THEOS=~/theos
          export PATH=$THEOS/bin:$PATH
          echo "THEOS set to: $THEOS"

      - name: Build Tweak
        run: |
          export THEOS=~/theos
          export PATH=$THEOS/bin:$PATH
          cd VencordIOS
          make package FINALPACKAGE=1

      - name: Decrypt Discord IPA
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APP_SPECIFIC_PASSWORD: ${{ secrets.APP_SPECIFIC_PASSWORD }}
        run: |
          cd VencordIOS
          if [ -f "Discord.ipa" ]; then
            echo "Using pre-existing Discord.ipa"
          elif [ -n "$APPLE_ID" ]; then
            echo "Downloading Discord IPA from App Store..."
            brew install ipatool || true
            ipatool auth login -e "$APPLE_ID" -p "$APPLE_PASSWORD" 2>/dev/null || true
            ipatool download -b com.hammerandchisel.discord -o Discord.ipa 2>/dev/null || echo "Could not download from App Store"
          else
            echo "No Apple ID provided. Using placeholder..."
            echo "You can place Discord.ipa in the repo root before building"
          fi

      - name: Prepare IPA
        run: |
          cd VencordIOS
          
          if [ -f "Discord.ipa" ]; then
            echo "Extracting Discord IPA..."
            unzip -q Discord.ipa -d Discord_extracted/
            
            echo "Copying tweak files..."
            cp .theos/obj/VencordIOS.dylib Discord_extracted/Payload/Discord.app/
            cp -r JavaScript/ Discord_extracted/Payload/Discord.app/VencordJS/
            
            echo "Injecting dylib..."
            optool install -c load -p @executable_path/VencordIOS.dylib \
              -t Discord_extracted/Payload/Discord.app/Discord || echo "optool failed, will try alternative"
            
            echo "Packaging IPA..."
            cd Discord_extracted
            zip -r ../VencordDiscord.ipa Payload/
            cd ..
            
            echo "IPA built successfully!"
            ls -la VencordDiscord.ipa
          else
            echo "No Discord IPA found. Creating build package with tweak files only..."
            mkdir -p BuildOutput
            cp .theos/obj/VencordIOS.dylib BuildOutput/ || true
            cp -r JavaScript/ BuildOutput/VencordJS/ || true
            cp Tweak.x BuildOutput/ || true
            cp Makefile BuildOutput/ || true
            cp build.sh BuildOutput/ || true
            cp README.md BuildOutput/ || true
            cp QUICKSTART.md BuildOutput/ || true
            echo "Build files ready. You need to provide Discord.ipa to complete the build."
          fi

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: VencordIOS
          path: |
            VencordIOS/VencordDiscord.ipa
            VencordIOS/BuildOutput/
          retention-days: 30

      - name: Summary
        run: |
          echo "## Build Complete!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### What was built:" >> $GITHUB_STEP_SUMMARY
          echo "- VencordIOS dylib (Theos tweak)" >> $GITHUB_STEP_SUMMARY
          echo "- 127 plugins loaded" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### To install:" >> $GITHUB_STEP_SUMMARY
          echo "1. Download the artifact" >> $GITHUB_STEP_SUMMARY
          echo "2. If you provided Discord.ipa, the full IPA is ready" >> $GITHUB_STEP_SUMMARY
          echo "3. If not, follow QUICKSTART.md to complete the build" >> $GITHUB_STEP_SUMMARY
          echo "4. Sideload via SideStore" >> $GITHUB_STEP_SUMMARY
