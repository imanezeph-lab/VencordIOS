name: Build Vencord iOS IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.2'

      - name: Install dependencies
        run: |
          brew install ldid dpkg

      - name: Build insert_dylib
        run: |
          git clone https://github.com/tyilo/insert_dylib.git /tmp/insert_dylib
          cd /tmp/insert_dylib
          xcodebuild -project insert_dylib.xcodeproj -configuration Release SYMROOT=build 2>&1 | tail -10
          sudo cp build/Release/insert_dylib /usr/local/bin/insert_dylib
          sudo chmod +x /usr/local/bin/insert_dylib
          insert_dylib --help 2>&1 | head -3 || echo "insert_dylib installed"

      - name: Install Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git ~/theos

      - name: Setup Theos SDKs
        run: |
          mkdir -p ~/theos/sdks
          curl -sL https://github.com/theos/sdks/archive/master.tar.gz | tar xz --strip-components=1 -C ~/theos/sdks
          ls ~/theos/sdks/ | head -5

      - name: Build Tweak
        run: |
          export THEOS=~/theos
          export PATH="$THEOS/bin:$PATH"
          make clean 2>/dev/null || true
          make package FINALPACKAGE=1 2>&1 | tail -80
          echo "=== Build output ==="
          find .theos/ -name "*.dylib" -o -name "*.a" 2>/dev/null
          find .theos/ -type f -name "*Vencord*" 2>/dev/null
          ls -la .theos/obj/ 2>/dev/null || echo "No .theos/obj/"
          ls -laR .theos/obj/ 2>/dev/null || true

      - name: Download Discord IPA
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download discord-ipa --repo ${{ github.repository }} --pattern "*.ipa" --output Discord.ipa
          ls -lh Discord.ipa

      - name: Prepare and inject
        run: |
          echo "=== Unzipping ==="
          unzip -q Discord.ipa -d Discord_extracted/

          APP_DIR="Discord_extracted/Payload/Discord.app"
          BINARY="$APP_DIR/Discord"
          DYLIB=$(find .theos/ -name "VencordIOS.dylib" -o -name "VencordIOS*.dylib" 2>/dev/null | head -1)
          if [ -z "$DYLIB" ]; then
            DYLIB=$(find .theos/ -name "*.dylib" 2>/dev/null | head -1)
          fi
          if [ -z "$DYLIB" ]; then
            echo "ERROR: No dylib found"
            echo "=== Full .theos directory listing ==="
            find .theos/ -type f 2>/dev/null
            exit 1
          fi

          echo "Dylib: $DYLIB"
          file "$BINARY"
          BEFORE_SIZE=$(stat -f%z "$BINARY")
          echo "Original binary size: $BEFORE_SIZE"

          # Check if fat binary
          if lipo -info "$BINARY" 2>&1 | grep -q "arm64e"; then
            echo "=== Fat binary: extracting slices ==="
            lipo "$BINARY" -thin arm64 -output /tmp/discord_arm64
            lipo "$BINARY" -thin arm64e -output /tmp/discord_arm64e
            IS_FAT=true
          else
            echo "=== Single architecture ==="
            cp "$BINARY" /tmp/discord_arm64
            IS_FAT=false
          fi

          # Save originals for shift calculation
          cp /tmp/discord_arm64 /tmp/discord_arm64_orig
          if [ "$IS_FAT" = true ]; then
            cp /tmp/discord_arm64e /tmp/discord_arm64e_orig
          fi

          # Check encryption - list all load commands
          echo "=== Load commands in original binary ==="
          python3 scripts/patch_macho.py list /tmp/discord_arm64 || true
          echo "=== otool cross-check ==="
          otool -l /tmp/discord_arm64 2>&1 | head -80

          # Inject dylib into arm64
          echo "=== Injecting dylib into arm64 ==="
          insert_dylib --strip-codesig --all-yes "@executable_path/VencordIOS.dylib" /tmp/discord_arm64
          if [ -f /tmp/discord_arm64_patched ]; then
            mv /tmp/discord_arm64_patched /tmp/discord_arm64
            echo "arm64 patched OK"
          fi

          if [ "$IS_FAT" = true ]; then
            echo "=== Injecting dylib into arm64e ==="
            insert_dylib --strip-codesig --all-yes "@executable_path/VencordIOS.dylib" /tmp/discord_arm64e
            if [ -f /tmp/discord_arm64e_patched ]; then
              mv /tmp/discord_arm64e_patched /tmp/discord_arm64e
              echo "arm64e patched OK"
            fi
          fi

          # Patch encryption offsets
          echo "=== Patching encryption offsets ==="
          python3 scripts/patch_macho.py patch /tmp/discord_arm64_orig /tmp/discord_arm64
          if [ "$IS_FAT" = true ]; then
            python3 scripts/patch_macho.py patch /tmp/discord_arm64e_orig /tmp/discord_arm64e
          fi

          # Verify injection
          echo "=== Verification ==="
          otool -L /tmp/discord_arm64 | grep -i vencord && echo "INJECTED arm64" || echo "MISSING arm64"
          if [ "$IS_FAT" = true ]; then
            otool -L /tmp/discord_arm64e | grep -i vencord && echo "INJECTED arm64e" || echo "MISSING arm64e"
          fi

          # Reassemble
          if [ "$IS_FAT" = true ]; then
            echo "=== Reassembling fat binary ==="
            lipo -create /tmp/discord_arm64 /tmp/discord_arm64e -output "$BINARY"
          else
            cp /tmp/discord_arm64 "$BINARY"
          fi

          echo "=== Final binary ==="
          file "$BINARY"
          otool -L "$BINARY" | grep -i vencord && echo "FINAL INJECTION VERIFIED" || echo "WARNING"

          # Copy tweak files
          cp "$DYLIB" "$APP_DIR/"
          cp VencordIOS.plist "$APP_DIR/"
          mkdir -p "$APP_DIR/VencordJS/plugins"
          cp JavaScript/plugins/*.js "$APP_DIR/VencordJS/plugins/"
          echo "Plugin files: $(ls "$APP_DIR/VencordJS/plugins/" | wc -l)"

          # Generate entitlements
          cat > /tmp/ent.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>platform-application</key>
            <true/>
            <key>com.apple.security.cs.allow-jit</key>
            <true/>
            <key>com.apple.private.security.no-sandbox</key>
            <true/>
          </dict>
          </plist>
          EOF

          # Re-sign everything
          echo "=== Re-signing ==="
          ldid -S/tmp/ent.plist "$APP_DIR/Discord" 2>&1 || ldid -S "$APP_DIR/Discord" 2>&1 || echo "Discord re-sign failed"
          ldid -S "$APP_DIR/VencordIOS.dylib" 2>&1 || echo "Dylib re-sign failed"

          if [ -d "$APP_DIR/Frameworks" ]; then
            for fw in "$APP_DIR/Frameworks/"*.framework; do
              if [ -d "$fw" ]; then
                fw_name=$(basename "$fw")
                fw_binary="$fw/$fw_name"
                if [ -f "$fw_binary" ]; then
                  ldid -S "$fw_binary" 2>/dev/null || true
                fi
              fi
            done
            echo "Frameworks re-signed"
          fi

          # Package IPA
          echo "=== Packaging IPA ==="
          cd Discord_extracted
          zip -qr ../VencordDiscord.ipa Payload/
          cd ..

          echo "=== Done ==="
          ls -lh VencordDiscord.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: VencordIOS-build
          path: VencordDiscord.ipa
          retention-days: 30
          if-no-files-found: error

      - name: Summary
        run: |
          echo "## Vencord iOS Build Complete!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Changes:" >> $GITHUB_STEP_SUMMARY
          echo "- Handles encrypted binaries (FairPlay DRM)" >> $GITHUB_STEP_SUMMARY
          echo "- Handles fat binaries (arm64 + arm64e)" >> $GITHUB_STEP_SUMMARY
          echo "- Patches LC_ENCRYPTION_INFO_64 after injection" >> $GITHUB_STEP_SUMMARY
          echo "- JIT entitlements for JavaScriptCore" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Install:" >> $GITHUB_STEP_SUMMARY
          echo "1. Download artifact → extract zip" >> $GITHUB_STEP_SUMMARY
          echo "2. SideStore → + → VencordDiscord.ipa" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Debug: check Documents/VencordIOS/vencord.log via Filza" >> $GITHUB_STEP_SUMMARY
