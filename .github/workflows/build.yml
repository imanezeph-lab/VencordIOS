name: Build Vencord iOS IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.2'

      - name: Install dependencies
        run: |
          brew install ldid dpkg

      - name: Build insert_dylib
        run: |
          git clone https://github.com/tyilo/insert_dylib.git /tmp/insert_dylib
          cd /tmp/insert_dylib
          xcodebuild -project insert_dylib.xcodeproj -configuration Release SYMROOT=build 2>&1 | tail -10
          sudo cp build/Release/insert_dylib /usr/local/bin/insert_dylib
          sudo chmod +x /usr/local/bin/insert_dylib
          insert_dylib --help 2>&1 | head -3 || echo "insert_dylib installed"

      - name: Install Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git ~/theos

      - name: Setup Theos SDKs
        run: |
          mkdir -p ~/theos/sdks
          curl -sL https://github.com/theos/sdks/archive/master.tar.gz | tar xz --strip-components=1 -C ~/theos/sdks
          ls ~/theos/sdks/ | head -5

      - name: Build Tweak
        run: |
          export THEOS=~/theos
          export PATH="$THEOS/bin:$PATH"
          make clean 2>/dev/null || true
          make package FINALPACKAGE=1 2>&1 | tail -50
          echo "=== Build output ==="
          find .theos/ -name "*.dylib" 2>/dev/null
          ls -la .theos/obj/ 2>/dev/null || echo "No .theos/obj/ directory"

      - name: Download Discord IPA
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download discord-ipa --repo ${{ github.repository }} --pattern "Discord.ipa" --output Discord.ipa
          ls -lh Discord.ipa

      - name: Prepare IPA
        run: |
          echo "=== Building full IPA ==="
          
          unzip -q Discord.ipa -d Discord_extracted/
          
          DYLIB=$(find .theos/ -name "VencordIOS.dylib" | head -1)
          if [ -z "$DYLIB" ]; then
            echo "ERROR: No dylib found"
            exit 1
          fi
          echo "Found dylib: $DYLIB"
          
          APP_DIR="Discord_extracted/Payload/Discord.app"
          
          # Copy tweak files
          cp "$DYLIB" "$APP_DIR/"
          cp VencordIOS.plist "$APP_DIR/"
          mkdir -p "$APP_DIR/VencordJS/plugins"
          cp JavaScript/plugins/*.js "$APP_DIR/VencordJS/plugins/"
          
          echo "Files copied to app bundle"
          ls -la "$APP_DIR/VencordIOS.dylib"
          ls "$APP_DIR/VencordJS/plugins/" | wc -l
          echo "plugins copied"
          
          # Inject dylib using insert_dylib (adds LC_LOAD_DYLIB command)
          echo "Injecting VencordIOS.dylib into Discord binary..."
          insert_dylib --strip-codesig --all-yes "@executable_path/VencordIOS.dylib" "$APP_DIR/Discord"
          
          # Verify injection
          otool -L "$APP_DIR/Discord" | grep -i vencord || echo "WARNING: dylib not found in load commands"
          
          # Re-sign with ldid to fix entitlements
          echo "Re-signing app..."
          ldid -S -e "$APP_DIR/VencordIOS.plist" "$APP_DIR/Discord" 2>/dev/null || true
          ldid -S "$APP_DIR/Discord" 2>/dev/null || true
          
          # Package IPA
          echo "Packaging IPA..."
          cd Discord_extracted
          zip -qr ../VencordDiscord.ipa Payload/
          cd ..
          
          echo "=== IPA built successfully! ==="
          ls -lh VencordDiscord.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: VencordIOS-build
          path: VencordDiscord.ipa
          retention-days: 30
          if-no-files-found: error

      - name: Summary
        run: |
          echo "## Vencord iOS Build Complete!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### What was built:" >> $GITHUB_STEP_SUMMARY
          echo "- VencordIOS.dylib (Theos tweak, arm64+arm64e)" >> $GITHUB_STEP_SUMMARY
          echo "- VencordIOS.plist (filter for Discord injection)" >> $GITHUB_STEP_SUMMARY
          echo "- 14 plugin JS files" >> $GITHUB_STEP_SUMMARY
          echo "- vencordAllPlugins.js (114 core plugins)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### To install:" >> $GITHUB_STEP_SUMMARY
          echo "1. Download VencordIOS-build artifact" >> $GITHUB_STEP_SUMMARY
          echo "2. Open SideStore" >> $GITHUB_STEP_SUMMARY
          echo "3. Tap + and select VencordDiscord.ipa" >> $GITHUB_STEP_SUMMARY
